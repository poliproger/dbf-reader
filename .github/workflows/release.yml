name: Release

# Publishes the plugin to JetBrains Marketplace when a release tag is pushed.
# scripts/release.sh creates the annotated vX.Y.Z tag on the "Release X.Y.Z" commit,
# where gradle.properties already carries the non-SNAPSHOT version — so the version
# built here is the released one. The PUBLISH_TOKEN repo secret holds a Marketplace
# Personal Access Token (https://plugins.jetbrains.com/author/me/tokens).
on:
  push:
    tags: [ "v*" ]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin
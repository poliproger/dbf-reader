name: Build

on:
  push:
  pull_request:
    branches: [ main ]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# NOTE: CI runs unit tests only. Plugin compatibility (`./gradlew verifyPlugin`,
# IntelliJ Plugin Verifier) is intentionally NOT wired up yet — open question,
# to revisit. See notes/ci-compatibility-check.md.
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
          if-no-files-found: ignore
